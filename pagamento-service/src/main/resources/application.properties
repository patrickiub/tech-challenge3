spring.application.name=pagamento-service
server.port=8081

# DataSource
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/techchallenge3?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:fiap}
spring.datasource.password=${DB_PASSWORD:fiap123}
spring.jpa.hibernate.ddl-auto=update

# Kafka Consumer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.consumer.group-id=pagamento-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Kafka Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Procpag
procpag.url=${PROCPAG_URL:http://localhost:8089}

# Resilience4j CircuitBreaker
resilience4j.circuitbreaker.instances.procpag.sliding-window-size=10
resilience4j.circuitbreaker.instances.procpag.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.procpag.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.procpag.permitted-number-of-calls-in-half-open-state=3

# Resilience4j Retry
resilience4j.retry.instances.procpag.max-attempts=3
resilience4j.retry.instances.procpag.wait-duration=2s
